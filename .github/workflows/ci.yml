name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8==7.1.0

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-ignore=E501 \
            --exclude=.venv,__pycache__,.git \
            --statistics
